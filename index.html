<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRAQ Chat | عراق جات</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --wa-green: #075e54; --wa-action: #00a884;
            --tt-red: #fe2c55; --msg-me: #dcf8c6; --msg-them: #ffffff;
        }

        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #fff; overflow: hidden; }

        .main-header { 
            position: sticky; top: 0; background: var(--wa-green); color: #fff; 
            padding: 10px 15px; display: flex; justify-content: space-between; 
            align-items: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        .btn-create-top { background: var(--wa-action); color: #fff; border: none; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; cursor: pointer; }

        #lobby-screen { display: block; height: 100vh; overflow-y: auto; padding-bottom: 60px; }
        .rooms-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .section-header { padding: 15px 12px 0; margin-top: 5px; }
        .section-title { font-size: 15px; font-weight: 900; color: #333; border-right: 4px solid var(--wa-action); padding-right: 8px; margin: 0; }

        .room-card-square { 
            position: relative; background: #fff; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column; 
            cursor: pointer; border: 1px solid #f0f0f0; transition: 0.2s;
        }
        .room-card-square:active { transform: scale(0.96); }
        .room-card-img { width: 100%; aspect-ratio: 1.1 / 1; object-fit: cover; background: #eee; }
        
        .room-card-info { padding: 8px; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 40px; }
        .room-card-name { font-weight: 700; font-size: 13px; color: #333; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        .del-room-btn {
            position: absolute; top: 8px; left: 8px; background: rgba(254, 44, 85, 0.9);
            color: #fff; border: none; width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
            z-index: 10; cursor: pointer;
        }

        #chat-screen { display: none; height: 100vh; flex-direction: column; background: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .chat-header { background: var(--wa-green); color: #fff; padding: 12px; display: flex; align-items: center; gap: 10px; font-weight: 800; }
        #msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-row { display: flex; gap: 8px; align-items: flex-end; max-width: 85%; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .u-avatar { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 1.5px solid #fff; object-fit: cover; background: #fff; }
        .bubble { padding: 8px 12px; font-size: 14px; font-weight: 600; border-radius: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .bubble.me { background: var(--msg-me); border-bottom-right-radius: 2px; }
        .bubble.them { background: var(--msg-them); border-bottom-left-radius: 2px; }

        .input-bar { padding: 8px; display: flex; align-items: center; gap: 8px; background: #f0f0f0; }
        .input-wrapper { background: #fff; flex: 1; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; min-height: 45px; }
        #m-in { flex: 1; border: none; outline: none; font-size: 15px; background: transparent; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-card { background: #fff; width: 85%; max-width: 300px; border-radius: 20px; padding: 20px; text-align: center; }
        .modal-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; text-align: center; }
        .btn-p { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="modal-create" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin:0">إنشاء غرفة جديدة</h3>
            <input type="text" id="new-room-name" class="modal-input" placeholder="اسم الغرفة...">
            <input type="file" id="room-img-file" accept="image/*" onchange="handleFile(this, 'room')" style="font-size:12px; margin:10px 0;">
            <div style="display:flex; gap:10px;">
                <button class="btn-p" style="background:var(--wa-action); color:#fff;" onclick="saveNewRoom()">تأكيد</button>
                <button class="btn-p" style="background:#eee;" onclick="hideModal('modal-create')">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="modal-profile" class="modal-overlay">
        <div class="modal-card">
            <img id="p-img" src="" style="width:85px; height:85px; border-radius:50%; margin-bottom:10px; border:2px solid var(--wa-action); object-fit: cover;">
            <div id="p-name" style="font-size:17px; font-weight:900; margin-bottom:12px;">...</div>
            
            <div id="my-profile-tools" style="display:none;">
                <label style="background:#eee; padding:8px; border-radius:10px; font-size:12px; cursor:pointer; display:block; margin-bottom:10px;">
                    🖼️ تغيير صورتي
                    <input type="file" accept="image/*" style="display:none;" onchange="handleFile(this, 'profile')">
                </label>
            </div>

            <button id="msg-btn" class="btn-p" style="background:var(--wa-action); color:#fff;" onclick="openPrivateChat()">مراسلة خاصة</button>
            <button id="block-btn" class="btn-p" style="background:var(--tt-red); color:#fff;" onclick="toggleBlockUser()">حظر</button>
            <button class="btn-p" style="background:#eee;" onclick="hideModal('modal-profile')">رجوع</button>
        </div>
    </div>

    <div id="lobby-screen">
        <div class="main-header">
            <h1 style="margin:0; font-size:18px; font-weight:900;" onclick="viewProfile(myUser.name, myUser.uid)">عراق جات 👤</h1>
            <button class="btn-create-top" onclick="showModal('modal-create')">+ إنشاء غرفة</button>
        </div>
        
        <div class="section-header"><h2 class="section-title">الغرف العامة</h2></div>
        <div id="public-rooms" class="rooms-grid"></div>

        <div class="section-header"><h2 class="section-title">غرف المستخدمين</h2></div>
        <div id="user-rooms" class="rooms-grid"></div>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <span onclick="goBack()" style="cursor:pointer; font-size:22px;">🔙</span>
            <div id="room-title" style="flex:1; text-align:center;">...</div>
        </div>
        <div id="msg-container"></div>
        <div class="input-bar">
            <div class="input-wrapper">
                <span onclick="toggleStickers()" style="cursor:pointer; font-size:20px; margin-left:8px;">😊</span>
                <input type="text" id="m-in" placeholder="اكتب رسالتك..." autocomplete="off">
            </div>
            <button onclick="sendMsg()" style="background:var(--wa-action); border:none; width:42px; height:42px; border-radius:50%; color:#fff;">🚀</button>
        </div>
        <div id="sticker-panel" style="display:none; background:#f0f0f0; padding:10px; grid-template-columns: repeat(6, 1fr); gap:10px; border-top:1px solid #ccc;"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCRnIF0BEIvf5axNd7S2CjGn1oBI5Ew4KI", authDomain: "tik-tak-cdfad.firebaseapp.com", projectId: "tik-tak-cdfad", databaseURL: "https://tik-tak-cdfad-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // بيانات المستخدم
        const myUser = { uid: "HAIDER_ALFAHAM", name: "حيدر الفهام", img: localStorage.getItem('user_img') || "" };
        const myEmojis = ['😂','❤️','🇮🇶','😍','🌹','🔥','😎','👍','✨','😢','🙌','🎉','🇸🇦','🌙','☕','⚽','👋','💎'];

        let currentRoomId = "", targetUser = null, roomImgBase64 = "";
        let blockedList = JSON.parse(localStorage.getItem('iraq_blocked_users') || "[]");

        // --- نظام الحظر المخفي ---
        db.ref('global_bans/' + myUser.uid).on('value', snap => {
            if(snap.val()) {
                document.body.innerHTML = "<div style='display:flex; height:100vh; align-items:center; justify-content:center; text-align:center; padding:20px;'><div><h1 style='color:red;'>🚫 تم حظرك</h1><p>لقد تم حظر وصولك إلى التطبيق من قبل الإدارة.</p></div></div>";
            }
        });

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onpopstate = () => { currentRoomId = ""; document.getElementById('lobby-screen').style.display = 'block'; document.getElementById('chat-screen').style.display = 'none'; };
        function goBack() { window.history.back(); }

        function handleFile(input, type) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if(type === 'room') roomImgBase64 = e.target.result;
                    if(type === 'profile') {
                        myUser.img = e.target.result;
                        localStorage.setItem('user_img', e.target.result);
                        document.getElementById('p-img').src = e.target.result;
                        alert("تم تحديث صورتك الشخصية!");
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        function saveNewRoom() {
            const name = document.getElementById('new-room-name').value;
            if(name.trim()) {
                db.ref('rooms_meta').push({ name: name, creator: myUser.name, img: roomImgBase64 || "https://via.placeholder.com/150", uid: myUser.uid });
                document.getElementById('new-room-name').value = ""; roomImgBase64 = ""; hideModal('modal-create');
            }
        }

        function deleteRoom(e, roomId) {
            e.stopPropagation();
            if(confirm("حذف الغرفة نهائياً؟")) { db.ref('rooms_meta/'+roomId).remove(); db.ref('chats/'+roomId).remove(); }
        }

        function renderPublicRooms() {
            const publics = [
                { name: 'دردشة العراق 🇮🇶', img: 'https://flagpedia.net/data/flags/w580/iq.png' },
                { name: 'غرفة المسابقات 🏆', img: 'https://img.freepik.com/free-vector/quiz-logo-with-speech-bubble-icon_1491-525.jpg' }
            ];
            const b = document.getElementById('public-rooms'); b.innerHTML = "";
            publics.forEach((r, index) => {
                b.innerHTML += `<div class="room-card-square" onclick="enterRoom('public_${index}', '${r.name}')">
                    <img src="${r.img}" class="room-card-img"><div class="room-card-info"><span class="room-card-name">${r.name}</span></div>
                </div>`;
            });
        }

        db.ref('rooms_meta').on('value', snap => {
            const uBox = document.getElementById('user-rooms'); uBox.innerHTML = "";
            snap.forEach(c => {
                const r = c.val();
                const isOwner = r.uid === myUser.uid;
                uBox.innerHTML += `<div class="room-card-square" onclick="enterRoom('${c.key}', '${r.name}')">
                    ${isOwner ? `<button class="del-room-btn" onclick="deleteRoom(event, '${c.key}')">🗑️</button>` : ''}
                    <img src="${r.img}" class="room-card-img"><div class="room-card-info"><span class="room-card-name">${r.name}</span></div>
                </div>`;
            });
        });

        function enterRoom(id, name) {
            currentRoomId = id; document.getElementById('room-title').innerText = name;
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            history.pushState({view:'chat'}, ""); loadMessages();
        }

        function loadMessages() {
            db.ref('chats/'+currentRoomId).limitToLast(50).on('value', snap => {
                const box = document.getElementById('msg-container'); box.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    if(blockedList.includes(d.uid)) return;
                    const isMe = d.uid === myUser.uid;
                    const userAvatar = d.img ? d.img : `https://api.dicebear.com/7.x/avataaars/svg?seed=${d.u}`;
                    box.innerHTML += `<div class="msg-row ${isMe?'me':''}">
                        <img src="${userAvatar}" class="u-avatar" onclick="viewProfile('${d.u}','${d.uid}', '${d.img || ""}')">
                        <div class="bubble ${isMe?'me':'them'}">${!isMe ? `<small style="color:var(--wa-green);display:block;font-weight:900;">${d.u}</small>` : ''}${d.m}</div>
                    </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- نظام الكتم المخفي عند الإرسال ---
        function sendMsg() {
            const i = document.getElementById('m-in');
            if(i.value.trim() && currentRoomId) {
                db.ref('global_mutes/' + myUser.uid).once('value', snap => {
                    if(snap.val()) {
                        alert("عذراً، أنت مكتوم حالياً من قبل الإدارة.");
                    } else {
                        db.ref('chats/'+currentRoomId).push({ u: myUser.name, uid: myUser.uid, m: i.value, img: myUser.img });
                        i.value = "";
                    }
                });
            }
        }

        function viewProfile(name, uid, userImg = "") {
            targetUser = { name, uid };
            document.getElementById('p-name').innerText = name;
            document.getElementById('p-img').src = userImg ? userImg : `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`;
            const isMe = uid === myUser.uid;
            document.getElementById('my-profile-tools').style.display = isMe ? 'block' : 'none';
            document.getElementById('msg-btn').style.display = isMe ? 'none' : 'block';
            document.getElementById('block-btn').style.display = isMe ? 'none' : 'block';
            if(!isMe) document.getElementById('block-btn').innerText = blockedList.includes(uid) ? "إلغاء الحظر" : "حظر المستخدم";
            showModal('modal-profile');
        }

        function toggleBlockUser() {
            if(blockedList.includes(targetUser.uid)) blockedList = blockedList.filter(id => id !== targetUser.uid);
            else blockedList.push(targetUser.uid);
            localStorage.setItem('iraq_blocked_users', JSON.stringify(blockedList));
            hideModal('modal-profile'); loadMessages();
        }

        function openPrivateChat() {
            const pId = myUser.uid < targetUser.uid ? `${myUser.uid}_${targetUser.uid}` : `${targetUser.uid}_${myUser.uid}`;
            hideModal('modal-profile'); enterRoom(`private_${pId}`, `خاص: ${targetUser.name}`);
        }

        function toggleStickers() {
            const p = document.getElementById('sticker-panel');
            p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
            if(p.innerHTML === "") {
                myEmojis.forEach(e => {
                    p.innerHTML += `<span style="font-size:25px;cursor:pointer;text-align:center;" onclick="document.getElementById('m-in').value += '${e}'">${e}</span>`;
                });
            }
        }

        renderPublicRooms();
    </script>
</body>
</html>
